name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: "true"

      - name: Choose static output
        id: output
        shell: bash
        run: |
          if [ -d "dist" ]; then
            echo "path=dist" >> "$GITHUB_OUTPUT"
          elif [ -d ".output/public" ]; then
            echo "path=.output/public" >> "$GITHUB_OUTPUT"
          elif [ -d "build/client" ]; then
            echo "path=build/client" >> "$GITHUB_OUTPUT"
          else
            echo "No known static output directory found" >&2
            find . -maxdepth 3 -type d | sort >&2
            exit 1
          fi

      - name: Add SPA fallback when available
        shell: bash
        run: |
          output="${{ steps.output.outputs.path }}"
          if [ -f "$output/index.html" ]; then
            cp "$output/index.html" "$output/404.html"
          else
            echo "No index.html found in $output; skipping SPA fallback."
            find "$output" -maxdepth 2 -type f | sort
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.output.outputs.path }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
