<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Keeper's Companion - Refresh App</title>
  <style>
    body{margin:0;background:#f4ead3;color:#2b211b;font-family:Georgia,'Times New Roman',serif;display:grid;min-height:100vh;place-items:center;padding:20px}.card{max-width:520px;background:#fff7e7;border:1px solid #decdaa;border-radius:10px;padding:20px;box-shadow:0 12px 30px rgba(43,33,27,.12)}button,a{display:inline-flex;margin-top:12px;border:1px solid #7f2d2a;border-radius:8px;background:#7f2d2a;color:#fff;padding:10px 12px;text-decoration:none;font:inherit}.muted{color:#796b5f}
  </style>
</head>
<body>
  <main class="card">
    <p class="muted">Keeper's Companion</p>
    <h1>Refreshing the app...</h1>
    <p id="status">Clearing the old offline copy. Your saved tasks and DLC choices are not removed.</p>
    <a id="back" href="./" hidden>Open Keeper's Companion</a>
  </main>
  <script>
    async function resetAppCache(){
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(reg => reg.unregister()));
      }
      if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(key => caches.delete(key)));
      }
      document.getElementById('status').textContent = 'Done. Open the app again and it should fetch the newest version.';
      document.getElementById('back').hidden = false;
    }
    resetAppCache().catch(() => {
      document.getElementById('status').textContent = 'I could not clear it automatically. Use your browser site settings to clear data for this site.';
      document.getElementById('back').hidden = false;
    });
  </script>
</body>
</html>
